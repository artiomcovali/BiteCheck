name: Update Cal Poly Menu Data

'on':
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: '${{ secrets.SUPABASE_URL }}'
      SUPABASE_SERVICE_ROLE_KEY: '${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}'
      MENU_TABLE: 'menu_items'
      PLAYWRIGHT_BROWSERS_PATH: '0'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cloudscraper playwright
          python -m playwright install chromium

      - name: Install Node dependencies
        run: npm ci

      - name: Run scraper
        run: |
          python3 scrape_calpoly_dining.py \
            --url https://dineoncampus.com/calpoly/ \
            --browser-discovery

      - name: Find generated CSV
        id: find_csv
        run: |
          CSV_FILE=$(ls calpoly_menu_*.csv | head -n 1)
          echo "csv_file=$CSV_FILE" >> "$GITHUB_OUTPUT"
          echo "Found CSV: $CSV_FILE"

      - name: Replace Supabase menu data
        run: |
          node scripts/import-menu-csv.js "${{ steps.find_csv.outputs.csv_file }}"

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: calpoly-menu
          path: calpoly_menu_*.csv
