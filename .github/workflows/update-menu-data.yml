name: Update Cal Poly Menu Data

'on':
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: '${{ secrets.SUPABASE_URL }}'
      SUPABASE_URL: '${{ secrets.SUPABASE_URL }}'
      SUPABASE_SERVICE_ROLE_KEY: '${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}'
      SCRAPERAPI_KEY: '${{ secrets.SCRAPERAPI_KEY }}'
      MENU_TABLE: 'menu_items'
      CSV_OUT: 'calpoly_menu_weekly.csv'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cloudscraper

      - name: Install Node dependencies
        run: npm ci

      - name: Run scraper (via ScraperAPI proxy)
        run: |
          python3 scrape_calpoly_dining.py \
            --url https://dineoncampus.com/calpoly/ \
            --out "${CSV_OUT}"

      - name: Replace Supabase menu data
        run: |
          npx --yes tsx scripts/import-csv.ts "${CSV_OUT}"

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: calpoly-menu
          path: '${{ env.CSV_OUT }}'
